name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint (ruff + docstring + em dash) ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff format (check only)
        run: ruff format --check src/ tests/

      - name: ruff check
        run: ruff check src/ tests/

      - name: Google-style docstring check
        run: python scripts/check_docstrings.py

      - name: em dash check (AGENTS.md convention)
        run: |
          if grep -rn '—' src/phi_gateway/ --include='*.py' | grep -v 'static_pages.py' | grep -v '# noqa'; then
            echo "::error::Em dashes found in source. Use colons, parens, or bullets."
            exit 1
          fi

      - name: mypy (info only)
        run: mypy src/phi_gateway/ --ignore-missing-imports || true

  # ── Tests (matrix: 3.12 + 3.13, with coverage) ────────────────
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -n auto -v --tb=short --cov=phi_gateway --cov-report=term-missing --cov-report=xml

      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage summary
        if: always()
        run: |
          echo '## Coverage Report' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest tests/ -q --tb=no --cov=phi_gateway --cov-report=term-missing 2>&1 | grep -A 50 "^TOTAL" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Smoke Tests (wheel install + --help) ───────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and install from wheel
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl

      - name: Verify phi-gateway --help
        run: phi-gateway --help

      - name: Verify import
        run: python -c "from phi_gateway import __version__; print(__version__)"

      - name: Install test deps
        run: pip install pytest pytest-asyncio httpx

      - name: Run smoke tests
        run: pytest tests/production/ -v --tb=short

  # ── Packaging ─────────────────────────────────────────────────
  packaging:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build

      - name: Twine check
        run: twine check dist/*

  # ── Docker Build (push only) ──────────────────────────────────
  build:
    needs: [lint, tests, smoke-test, packaging]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t phi-gateway:ci .
