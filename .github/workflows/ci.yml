name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ───────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy (info only)
        run: mypy src/phi_gateway/ --ignore-missing-imports || true

  # ── Unit Tests (matrix: 3.12 + 3.13) ─────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=phi_gateway --cov-report=term-missing \
            | tee test-output.txt
        continue-on-error: true

      - name: Show coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 50 "^TOTAL" test-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Integration Tests (matrix: 3.12 + 3.13) ──────────────────
  integration-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  # ── Production Smoke Tests ────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install from wheel (not editable)
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl --force-reinstall

      - name: Verify phi-gateway --help
        run: phi-gateway --help

      - name: Verify import works
        run: python -c "from phi_gateway import __version__; print(__version__)"

      - name: Run production smoke tests
        run: pytest tests/production/ -v --tb=short

  # ── Packaging Check ──────────────────────────────────────────
  packaging:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

  # ── Docker Build (push only, on main/staging) ──────────────────
  build:
    needs: [lint, unit-test, integration-test, smoke-test, packaging]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t phi-gateway:ci .
