services:
  api:
    image: phi-gateway:latest
    container_name: phi-gateway
    network_mode: host
    env_file: .env
    environment:
      - APP_ROOT=/app
    volumes:
      - phi_data:/app/data
      - ./srv/landing:/app/srv/landing
    restart: unless-stopped
    mem_limit: 1g

volumes:
  phi_data:
