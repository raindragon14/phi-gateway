<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhiGateway — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #121212;
            --bg-code: #050505;
            --border: #222222;
            --border-hover: #333333;
            --text: #ededed;
            --text-heading: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --text-subtle: #3f3f46;
            --ok: #22c55e;
            --warn: #eab308;
            --ease: cubic-bezier(0.2, 0, 0, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Geist', 'Helvetica Neue', -apple-system, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            min-height: 100vh; display: flex;
            -webkit-font-smoothing: antialiased;
        }
        body.font-mono { font-family: 'Geist Mono', 'SF Mono', 'JetBrains Mono', monospace; }

        /* Sidebar */
        .sidebar {
            width: 220px; min-height: 100vh; background: var(--bg-surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-brand {
            padding: 18px 20px; border-bottom: 1px solid var(--border);
        }
        .sidebar-brand a {
            display: flex; align-items: center; gap: 8px; font-size: 14px;
            font-weight: 500; color: var(--text-heading); text-decoration: none;
            letter-spacing: -0.01em;
        }
        .sidebar-brand svg { width: 22px; height: 22px; }
        .sidebar-brand .version { font-size: 10px; color: var(--text-subtle); margin-top: 2px; }
        .sidebar-nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px; padding: 7px 12px;
            border-radius: 2px; font-size: 12px; font-weight: 500; color: var(--text-muted);
            text-decoration: none; transition: all 50ms var(--ease);
        }
        .sidebar-nav a:hover { color: var(--text); background: var(--bg-elevated); }
        .sidebar-nav a.active { color: var(--text-heading); background: var(--bg-elevated); }
        .sidebar-nav a svg { width: 16px; height: 16px; opacity: 0.7; }
        .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-subtle); }

        /* Main */
        .main { flex: 1; overflow-y: auto; }
        .main-inner { padding: 32px 40px; max-width: 960px; }

        /* Typography */
        h1 { font-size: 22px; font-weight: 500; color: var(--text-heading); letter-spacing: -0.01em; margin-bottom: 4px; }
        h2 { font-size: 15px; font-weight: 600; color: var(--text-heading); margin-bottom: 10px; }
        h3 { font-size: 13px; font-weight: 600; color: var(--text-heading); margin-bottom: 6px; }
        .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }

        /* Cards */
        .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 12px; }
        .card:hover { border-color: var(--border-hover); }

        /* Stat grid */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 28px; }
        .stat { background: var(--bg-surface); padding: 20px; text-align: center; }
        .stat .val { font-size: 28px; font-weight: 500; color: var(--text-heading); letter-spacing: -0.02em; }
        .stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.3px; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
            border-radius: 2px; font-size: 12px; font-weight: 500; text-decoration: none;
            font-family: inherit; cursor: pointer; transition: all 120ms var(--ease);
            border: 1px solid var(--border);
        }
        .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
        .btn-primary:hover { background: var(--text-heading); border-color: var(--text-heading); }
        .btn-secondary { background: var(--bg-surface); color: var(--text); }
        .btn-secondary:hover { border-color: var(--border-hover); background: var(--bg-elevated); }
        .btn-danger { background: transparent; color: #ef4444; border-color: #3b1a1a; }
        .btn-danger:hover { background: #1f0808; border-color: #7f1d1d; }

        /* Inputs */
        .input {
            background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
            padding: 6px 10px; font-size: 12px; color: var(--text); font-family: inherit;
            width: 100%; outline: none; transition: border-color 50ms var(--ease);
        }
        .input:focus { border-color: var(--text); }

        /* Code blocks */
        pre.code {
            background: var(--bg-code); border: 1px solid var(--border); border-radius: 2px;
            padding: 14px 18px; font-family: 'Geist Mono', 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 12px; line-height: 1.55; color: var(--text-secondary);
            overflow-x: auto; white-space: pre-wrap; word-break: break-word;
        }
        pre.code .ps1 { color: var(--text-subtle); user-select: none; }
        pre.code .ps1::before { content: "$ "; color: var(--text-subtle); }
        pre.code .cmd { color: var(--text); }
        pre.code .flag { color: var(--text-muted); }
        pre.code .comment { color: var(--text-subtle); }

        /* Badges */
        .badge { display: inline-block; padding: 1px 7px; border-radius: 2px; font-size: 10px; font-weight: 500; }
        .badge-free { background: #1a1a1a; color: var(--text-muted); border: 1px solid var(--border); }
        .badge-pro { background: #0a0a0a; color: var(--text); border: 1px solid var(--border-hover); }
        .badge-team { background: #0a0a0a; color: var(--text-heading); border: 1px solid var(--text-subtle); }
        .badge-admin { background: #0a0a0a; color: var(--ok); border: 1px solid #1a3a1a; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        td { font-size: 12px; padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        tr:last-child td { border-bottom: none; }
        td.mono { font-family: 'Geist Mono', 'SF Mono', monospace; font-size: 11px; }

        /* Agent tutorial steps */
        .tutorial-step {
            display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border);
        }
        .tutorial-step:last-child { border-bottom: none; }
        .tutorial-step .num {
            width: 26px; height: 26px; background: var(--text); border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: var(--bg); flex-shrink: 0; margin-top: 2px;
        }
        .tutorial-step .body { flex: 1; }
        .tutorial-step h3 { font-size: 13px; margin-bottom: 4px; }
        .tutorial-step p { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.6; }
        .tutorial-step pre.code { margin-top: 6px; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 50px; }
            .sidebar-brand span, .sidebar-brand .version,
            .sidebar-nav a span, .sidebar-footer { display: none; }
            .sidebar-nav a { justify-content: center; padding: 10px; }
            .main-inner { padding: 20px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <a href="/dashboard">
                <svg viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1"/><text x="16" y="22" text-anchor="middle" font-size="19" font-family="Georgia,serif" font-weight="700" fill="#ededed" font-style="italic">&phi;</text></svg>
                <span>PhiGateway</span>
            </a>
            <div class="version">v0.1.0</div>
        </div>
        <div class="sidebar-nav">
            <a href="/dashboard" class="{% if active == 'overview' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Overview</span>
            </a>
            <a href="/dashboard/keys" class="{% if active == 'keys' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="8" cy="12" r="5"/><path d="M12 12l8 0"/><circle cx="18" cy="12" r="2"/></svg>
                <span>API Keys</span>
            </a>
            <a href="/dashboard/usage" class="{% if active == 'usage' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="14" width="4" height="6" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="18" y="2" width="4" height="18" rx="1"/></svg>
                <span>Usage</span>
            </a>
            <a href="/dashboard/docs" class="{% if active == 'docs' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h10M4 18h6"/><circle cx="18" cy="18" r="3"/></svg>
                <span>Docs</span>
            </a>
            <a href="/dashboard/memory" class="{% if active == 'memory' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="12" rx="2"/><circle cx="8" cy="10" r="1.5"/><circle cx="14" cy="10" r="1.5"/></svg>
                <span>Memory</span>
            </a>
        </div>
        <div class="sidebar-footer">MIT License</div>
    </nav>
    <main class="main">
        <div class="main-inner">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
