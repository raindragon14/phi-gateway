<!--
  memory.html — Agent memory browser page.

  Extends: base.html
  Shows: conversations table (session ID, title, dates),
         expandable messages panel per conversation.
  JS:
    loadConversations() — GET /v1/memory/conversations, renders table.
    loadMessages(convId) — GET /v1/memory/conversations/{id}/messages?limit=50,
        renders messages with role badge, timestamp, token count.
-->
{% extends "base.html" %}
{% block title %}Memory{% endblock %}
{% block content %}

<h1>Agent Memory</h1>
<p class="subtitle">Browse conversations and messages stored for your agents.</p>

<div class="card card-gap-lg">
    <h2>Conversations</h2>
    <div id="conversations-list">
        <p class="text-small">Loading conversations...</p>
    </div>
</div>

<div class="card hidden" id="messages-card">
    <div class="flex-between mb-md">
        <h2 style="margin:0;">Messages</h2>
        <button class="btn btn-secondary btn-xs" onclick="document.getElementById('messages-card').classList.add('hidden'); document.getElementById('messages-body').innerHTML='';">Close</button>
    </div>
    <div id="messages-body"></div>
</div>

<script>
async function loadConversations() {
    const key = sessionStorage.getItem('phi_api_key');
    if (!key) {
        document.getElementById('conversations-list').innerHTML =
            '<p class="text-small">Set your API key to view conversations.</p>';
        return;
    }
    try {
        const resp = await fetch('/v1/memory/conversations', { headers: { 'Authorization': `Bearer ${key}` }});
        const convs = await resp.json();
        if (!Array.isArray(convs) || convs.length === 0) {
            document.getElementById('conversations-list').innerHTML =
                '<p class="text-small">No conversations yet. Create one via POST /v1/memory/conversations</p>';
            return;
        }
        document.getElementById('conversations-list').innerHTML = `
            <table>
                <thead><tr><th>Session ID</th><th>Title</th><th>Created</th><th>Updated</th><th></th></tr></thead>
                <tbody>${convs.map(c => `
                    <tr>
                        <td class="mono">${c.session_id}</td>
                        <td>${c.title || '—'}</td>
                        <td>${new Date(c.created_at).toLocaleString()}</td>
                        <td>${new Date(c.updated_at).toLocaleString()}</td>
                        <td><button class="btn btn-secondary btn-xs" onclick="loadMessages('${c.id}')">View</button></td>
                    </tr>
                `).join('')}</tbody>
            </table>`;
    } catch(e) {
        document.getElementById('conversations-list').innerHTML =
            '<p class="text-small">Failed to load conversations.</p>';
    }
}

async function loadMessages(convId) {
    const key = sessionStorage.getItem('phi_api_key');
    try {
        const resp = await fetch(`/v1/memory/conversations/${convId}/messages?limit=50`, {
            headers: { 'Authorization': `Bearer ${key}` }
        });
        const msgs = await resp.json();
        document.getElementById('messages-body').innerHTML = (msgs || []).map(m => `
            <div style="border-bottom:1px solid var(--border);padding:10px 0;">
                <div class="flex-row mb-sm">
                    <span class="badge badge-${m.role === 'assistant' ? 'pro' : 'free'}">${m.role}</span>
                    <span class="text-small">${new Date(m.created_at).toLocaleString()}</span>
                    ${m.token_count ? `<span class="text-small">${m.token_count} tokens</span>` : ''}
                </div>
                <p class="text-small" style="white-space:pre-wrap;">${m.content}</p>
            </div>
        `).join('') || '<p class="text-small">No messages.</p>';
        document.getElementById('messages-card').classList.remove('hidden');
    } catch(e) {
        document.getElementById('messages-body').innerHTML =
            '<p class="text-small">Failed to load messages.</p>';
    }
}

loadConversations();
</script>
{% endblock %}
