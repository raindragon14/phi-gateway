<!-- HTMX fragment: keys table (loaded by /dashboard/keys/table) -->
<div id="keys-table">
    <p style="font-size:12px;color:var(--text-muted);" hx-get="/v1/keys" hx-trigger="load" hx-target="#keys-table">
        Loading keys...
    </p>
</div>

<script>
// HTMX after-swap handler for key data
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'keys-table' && evt.detail.xhr.responseURL.includes('/v1/keys')) {
        const data = JSON.parse(evt.detail.xhr.response);
        if (!Array.isArray(data) || data.length === 0) {
            evt.detail.target.innerHTML = '<p style="font-size:12px;color:var(--text-muted);">No keys yet.</p>';
            return;
        }
        evt.detail.target.innerHTML = `
            <table>
                <thead><tr><th>Prefix</th><th>Name</th><th>Tier</th><th>Created</th><th>Last used</th></tr></thead>
                <tbody>${data.map(k => `
                    <tr>
                        <td class="mono">${k.prefix}&hellip;</td>
                        <td>${k.name}</td>
                        <td><span class="badge badge-${k.tier}">${k.tier}</span></td>
                        <td>${new Date(k.created_at).toLocaleDateString()}</td>
                        <td>${k.last_used_at ? new Date(k.last_used_at).toLocaleString() : '—'}</td>
                    </tr>
                `).join('')}</tbody>
            </table>`;
    }
});
</script>
