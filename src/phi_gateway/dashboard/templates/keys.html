{% extends "base.html" %}
{% block title %}API Keys{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-white mb-2">API Keys</h1>
    <p class="text-gray-400 mb-8">Manage your API keys. The full key is shown only once after creation.</p>

    <!-- Create Key Form -->
    <div class="card mb-8">
        <h2 class="text-xl font-semibold mb-4">Create New Key</h2>
        <div class="flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-sm text-gray-400 mb-1">Key Name</label>
                <input type="text" id="key-name" class="input" placeholder="e.g., Production Key">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Tier</label>
                <select id="key-tier" class="input">
                    <option value="free">Free</option>
                    <option value="pro">Pro</option>
                    <option value="team">Team</option>
                </select>
            </div>
            <button onclick="createKey()" class="btn-primary">Create Key</button>
        </div>
        <div id="key-result" class="mt-4 hidden">
            <div class="bg-gray-950 border border-phi-800 rounded-lg p-4">
                <p class="text-sm text-phi-400 mb-2">⚠️ Copy this key now — it won't be shown again!</p>
                <code id="key-value" class="text-sm font-mono text-green-400 break-all"></code>
            </div>
        </div>
    </div>

    <!-- Keys List -->
    <div class="card">
        <h2 class="text-xl font-semibold mb-4">Your Keys</h2>
        <div id="keys-list" hx-get="/dashboard/keys/table" hx-trigger="load, every:10s" hx-swap="innerHTML">
            <p class="text-gray-500">Loading...</p>
        </div>
    </div>
</div>

<script>
async function createKey() {
    const name = document.getElementById('key-name').value;
    const tier = document.getElementById('key-tier').value;
    const key = sessionStorage.getItem('phi_api_key');
    if (!name) { alert('Please enter a key name'); return; }

    const headers = { 'Content-Type': 'application/json' };
    if (key) { headers['Authorization'] = `Bearer ${key}`; }

    try {
        const resp = await fetch('/v1/keys', { method: 'POST', headers, body: JSON.stringify({name, tier}) });
        const data = await resp.json();
        if (resp.ok) {
            document.getElementById('key-value').textContent = data.key;
            document.getElementById('key-result').classList.remove('hidden');
            document.getElementById('key-name').value = '';
            // Reload the keys table
            htmx.trigger('#keys-list', 'load');
        } else {
            alert('Error: ' + (data.detail || 'Unknown error'));
        }
    } catch(e) { alert('Error: ' + e.message); }
}

async function revokeKey(id) {
    if (!confirm('Revoke this API key? This cannot be undone.')) return;
    const key = sessionStorage.getItem('phi_api_key');
    try {
        const resp = await fetch(`/v1/keys/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${key}` }
        });
        if (resp.ok) {
            htmx.trigger('#keys-list', 'load');
        } else {
            const data = await resp.json();
            alert('Error: ' + (data.detail || 'Unknown error'));
        }
    } catch(e) { alert('Error: ' + e.message); }
}
</script>
{% endblock %}
